apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-tunnel
  namespace: ahava-ml
type: Opaque
stringData:
  TUNNEL_TOKEN: REPLACE_ME_TUNNEL_TOKEN
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: ahava-ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel
                  key: TUNNEL_TOKEN
