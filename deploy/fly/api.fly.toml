app            = "ahava-healthcare-api"
primary_region = "jnb"

[build]
  # ../../Dockerfile.fly = repo root, relative to this config file in deploy/fly/
  dockerfile = "../../Dockerfile.fly"

[env]
  NODE_ENV = "production"
  TIMEZONE = "Africa/Johannesburg"
  PORT     = "4000"

[http_service]
  internal_port        = 4000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 1          # always keep 1 warm — no cold starts

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "5s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
